name: 部署网站到 GitHub Pages

on:
  push:
    branches: ["main"] # 监听 main 分支的推送事件

# 设置权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 默认输出目录是 dist
          path: "./dist"

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
