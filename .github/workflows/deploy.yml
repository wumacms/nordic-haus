name: 部署网站到 GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          # 可以指定版本，也可以设为 latest
          version: latest

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # 注意：这里 cache 改为 pnpm
          cache: "pnpm"

      - name: 安装依赖
        run: pnpm install

      - name: 构建项目
        run: pnpm run build

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
